<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafetín Central - UCV</title>
  <!-- Importacion de hoja de estilos (archivo index.css) -->
  <link rel="stylesheet" href="./styles/index.css">
</head>
<body>

  <!-- Panel para el inicio de sesión -->
  <section class="login-panel">
    <!-- Encabezado del panel de login -->
    <h1>Bienvenido a <span>Cafetín Central</span></h1>
    <p class="subtitle">Sistema de gestión de la cafetería de la UCV. Pedidos, menú y ventas en un solo lugar.</p>

    <!-- Mensaje de error de credenciales -->
    <p class="error-msg" id="error-msg">Credenciales incorrectas. Intentalo de nuevo.</p>

    <!-- Formulario para ingresar las credenciales -->
    <form class="form-group">
      <!-- Ingresar nombre de usuario (ej. ClienteUCV, caja_01, adminRoot) -->
      <label class="form-label" for="username">Usuario</label>
      <input class="form-input" type="text" id="username" placeholder="Ej. ClienteUCV" autocomplete="username" />
      <!-- Ingresar contraseña (ej. Central_123, Cajero#123, cafetinAdmin) -->
      <label class="form-label" for="password">Contraseña</label>
      <input class="form-input" type="password" id="password" placeholder="••••••" autocomplete="current-password" />
    </form>

    <!-- Boton para iniciar sesion -->
    <button class="login-btn" id="login-btn">Iniciar Sesión</button>
  </section>

  <!-- Importacion de hoja de scripts (archivo index.js) -->
  <script src="./scripts/index.js"></script>
</body>
</html>
